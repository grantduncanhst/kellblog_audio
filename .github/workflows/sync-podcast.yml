name: Sync Kellblog Podcast

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install Python package
        run: |
          uv sync --extra kokoro
          uv pip install -e .

      - name: Restore catalog from R2
        run: uv run kellblog-audio restore-catalog || true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Ingest new posts
        run: uv run kellblog-audio ingest

      - name: Synthesize pending
        run: uv run kellblog-audio synthesize --pending
        env:
          KELLBLOG_TTS_PROVIDER: kokoro

      - name: Publish to R2
        run: uv run kellblog-audio publish
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          KELLBLOG_AUDIO_PUBLIC_URL: ${{ vars.KELLBLOG_AUDIO_PUBLIC_URL }}

      - name: Backup catalog
        run: uv run kellblog-audio backup-catalog
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
