name: Distributed Backfill

on:
  workflow_dispatch:
    inputs:
      shard_count:
        description: "Total shard count for the run"
        required: true
        default: "6"
        type: string
      qa_first:
        description: "QA the first N freshly synthesized episodes per shard"
        required: true
        default: "0"
        type: string
      year:
        description: "Optional year filter"
        required: false
        default: ""
        type: string
      local_helper_shards:
        description: "Optional comma-separated shard indexes reserved for a local Mac helper, e.g. 0 or 0,1"
        required: false
        default: ""
        type: string
      resume_run_id:
        description: "Optional logical run_id to resume; reruns only missing shard manifests"
        required: false
        default: ""
        type: string
      seed_run_id:
        description: "Optional prior run_id whose final catalog should seed a fresh retry run"
        required: false
        default: ""
        type: string
      auto_resume:
        description: "Automatically dispatch continuation runs for missing shards or retryable error rows"
        required: true
        default: "1"
        type: string
      resume_depth:
        description: "Internal continuation depth counter"
        required: true
        default: "0"
        type: string
      max_auto_resumes:
        description: "Maximum automatic continuation dispatches for the logical run"
        required: true
        default: "10"
        type: string

concurrency:
  group: distributed-backfill
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

env:
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  KELLBLOG_AUDIO_PUBLIC_URL: ${{ vars.KELLBLOG_AUDIO_PUBLIC_URL }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.plan.outputs.run_id }}
      shard_count: ${{ steps.plan.outputs.shard_count }}
      qa_first: ${{ steps.plan.outputs.qa_first }}
      year: ${{ steps.plan.outputs.year }}
      local_helper_shards: ${{ steps.plan.outputs.local_helper_shards }}
      auto_resume: ${{ steps.plan.outputs.auto_resume }}
      resume_depth: ${{ steps.plan.outputs.resume_depth }}
      max_auto_resumes: ${{ steps.plan.outputs.max_auto_resumes }}
      gha_shard_count: ${{ steps.plan.outputs.gha_shard_count }}
      gha_matrix: ${{ steps.plan.outputs.gha_matrix }}
      completed_shards: ${{ steps.plan.outputs.completed_shards }}
      missing_shards: ${{ steps.plan.outputs.missing_shards }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install Python package
        run: uv sync --frozen --extra chatterbox

      - name: Compute run plan
        id: plan
        env:
          INPUT_SHARD_COUNT: ${{ inputs.shard_count }}
          INPUT_QA_FIRST: ${{ inputs.qa_first }}
          INPUT_YEAR: ${{ inputs.year }}
          INPUT_LOCAL_HELPER_SHARDS: ${{ inputs.local_helper_shards }}
          INPUT_RESUME_RUN_ID: ${{ inputs.resume_run_id }}
          INPUT_SEED_RUN_ID: ${{ inputs.seed_run_id }}
          INPUT_AUTO_RESUME: ${{ inputs.auto_resume }}
          INPUT_RESUME_DEPTH: ${{ inputs.resume_depth }}
          INPUT_MAX_AUTO_RESUMES: ${{ inputs.max_auto_resumes }}
        run: |
          uv run python - <<'PY'
          import json
          import os

          from kellblog_audio.distributed_backfill import plan_backfill_run

          shard_count = int(os.environ["INPUT_SHARD_COUNT"])
          qa_first = int(os.environ["INPUT_QA_FIRST"])
          resume_depth = int(os.environ.get("INPUT_RESUME_DEPTH", "0"))
          max_auto_resumes = int(os.environ.get("INPUT_MAX_AUTO_RESUMES", "10"))
          if resume_depth < 0:
              raise SystemExit("resume_depth must be >= 0")
          if max_auto_resumes < 0:
              raise SystemExit("max_auto_resumes must be >= 0")

          plan = plan_backfill_run(
              shard_count=shard_count,
              qa_first=qa_first,
              year=os.environ.get("INPUT_YEAR", ""),
              local_helper_shards_raw=os.environ.get("INPUT_LOCAL_HELPER_SHARDS", ""),
              github_run_id=os.environ["GITHUB_RUN_ID"],
              resume_run_id=os.environ.get("INPUT_RESUME_RUN_ID", ""),
          )
          outputs = {
              "run_id": plan.run_id,
              "shard_count": str(shard_count),
              "qa_first": str(qa_first),
              "year": plan.year or "",
              "local_helper_shards": ",".join(str(shard) for shard in plan.local_helper_shards),
              "auto_resume": os.environ.get("INPUT_AUTO_RESUME", "1"),
              "resume_depth": str(resume_depth),
              "max_auto_resumes": str(max_auto_resumes),
              "gha_shard_count": str(len(plan.gha_shards)),
              "gha_matrix": json.dumps({"shard": plan.gha_shards}),
              "completed_shards": ",".join(str(shard) for shard in plan.completed_shards),
              "missing_shards": ",".join(str(shard) for shard in plan.missing_shards),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Create or restore run baseline catalog
        env:
          INPUT_RESUME_RUN_ID: ${{ inputs.resume_run_id }}
          INPUT_SEED_RUN_ID: ${{ inputs.seed_run_id }}
        run: |
          if [[ -n "$INPUT_RESUME_RUN_ID" ]]; then
            uv run kellblog-audio create-backfill-baseline --run-id "${{ steps.plan.outputs.run_id }}" --resume-existing
          elif [[ -n "$INPUT_SEED_RUN_ID" ]]; then
            uv run kellblog-audio seed-backfill-baseline \
              --run-id "${{ steps.plan.outputs.run_id }}" \
              --from-run-id "$INPUT_SEED_RUN_ID" \
              --from-kind final \
              --retry-errors
          else
            uv run kellblog-audio create-backfill-baseline --run-id "${{ steps.plan.outputs.run_id }}"
          fi

      - name: Write run plan summary
        env:
          PLAN_RUN_ID: ${{ steps.plan.outputs.run_id }}
          PLAN_SHARD_COUNT: ${{ steps.plan.outputs.shard_count }}
          PLAN_GHA_MATRIX: ${{ steps.plan.outputs.gha_matrix }}
          PLAN_LOCAL_HELPER_SHARDS: ${{ steps.plan.outputs.local_helper_shards }}
          PLAN_YEAR: ${{ steps.plan.outputs.year }}
          PLAN_QA_FIRST: ${{ steps.plan.outputs.qa_first }}
          PLAN_SEED_RUN_ID: ${{ inputs.seed_run_id }}
          PLAN_AUTO_RESUME: ${{ steps.plan.outputs.auto_resume }}
          PLAN_RESUME_DEPTH: ${{ steps.plan.outputs.resume_depth }}
          PLAN_MAX_AUTO_RESUMES: ${{ steps.plan.outputs.max_auto_resumes }}
          PLAN_COMPLETED_SHARDS: ${{ steps.plan.outputs.completed_shards }}
          PLAN_MISSING_SHARDS: ${{ steps.plan.outputs.missing_shards }}
        run: |
          {
            echo "## Distributed backfill plan"
            echo "- Run ID: \`${PLAN_RUN_ID}\`"
            echo "- Shard count: \`${PLAN_SHARD_COUNT}\`"
            echo "- GitHub-hosted shards: \`${PLAN_GHA_MATRIX}\`"
            echo "- Completed shard manifests: \`${PLAN_COMPLETED_SHARDS:-none}\`"
            echo "- Missing shard manifests: \`${PLAN_MISSING_SHARDS:-none}\`"
            echo "- Local helper shards: \`${PLAN_LOCAL_HELPER_SHARDS:-none}\`"
            echo "- Seeded from run: \`${PLAN_SEED_RUN_ID:-none}\`"
            echo "- Year filter: \`${PLAN_YEAR:-all years}\`"
            echo "- QA first: \`${PLAN_QA_FIRST}\`"
            echo "- Auto resume: \`${PLAN_AUTO_RESUME}\`"
            echo "- Resume depth: \`${PLAN_RESUME_DEPTH}/${PLAN_MAX_AUTO_RESUMES}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  synthesize:
    needs: prepare
    if: ${{ needs.prepare.outputs.gha_shard_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 840
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.gha_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install Python package
        run: uv sync --frozen --extra chatterbox

      - name: Restore run baseline catalog
        run: uv run kellblog-audio restore-catalog --run-id "${{ needs.prepare.outputs.run_id }}" --kind baseline

      - name: Synthesize shard on GitHub runner
        env:
          RUN_ID: ${{ needs.prepare.outputs.run_id }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
          QA_FIRST: ${{ needs.prepare.outputs.qa_first }}
          YEAR: ${{ needs.prepare.outputs.year }}
          KELLBLOG_TTS_PROVIDER: chatterbox
          KELLBLOG_CHATTERBOX_DEVICE: cpu
          KELLBLOG_CHATTERBOX_EXAGGERATION: "0.4"
        run: |
          mkdir -p artifacts/manifests
          manifest_path="artifacts/manifests/shard-${{ matrix.shard }}-of-${SHARD_COUNT}.json"
          manifest_r2_key="backfill/runs/${RUN_ID}/manifests/shard-${{ matrix.shard }}-of-${SHARD_COUNT}.json"
          cmd=(
            uv run kellblog-audio synthesize --pending
            --run-id "$RUN_ID"
            --shard "${{ matrix.shard }}/${SHARD_COUNT}"
            --qa-first "$QA_FIRST"
            --upload-r2
            --manifest-out "$manifest_path"
            --manifest-r2-key "$manifest_r2_key"
          )
          if [[ -n "$YEAR" ]]; then
            cmd+=(--year "$YEAR")
          fi
          "${cmd[@]}"

      - name: Upload shard manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: shard-manifest-${{ matrix.shard }}
          path: artifacts/manifests/shard-${{ matrix.shard }}-of-${{ needs.prepare.outputs.shard_count }}.json
          if-no-files-found: error

  finalize:
    needs: [prepare, synthesize]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.synthesize.result == 'success' || needs.synthesize.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y espeak-ng ffmpeg

      - name: Install Python package
        run: uv sync --frozen --extra chatterbox

      - name: Restore run baseline catalog
        run: uv run kellblog-audio restore-catalog --run-id "${{ needs.prepare.outputs.run_id }}" --kind baseline

      - name: Download and validate shard manifests
        env:
          RUN_ID: ${{ needs.prepare.outputs.run_id }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
        run: |
          mkdir -p artifacts/manifests
          uv run python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          import boto3
          from botocore.config import Config

          run_id = os.environ["RUN_ID"]
          shard_count = int(os.environ["SHARD_COUNT"])
          manifest_dir = Path("artifacts/manifests")
          prefix = f"backfill/runs/{run_id}/manifests/"
          endpoint = f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com"
          client = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
          )

          pattern = re.compile(rf"^{re.escape(prefix)}shard-([0-9]+)-of-([0-9]+)\\.json$")
          found = {}
          unexpected = []
          paginator = client.get_paginator("list_objects_v2")
          for page in paginator.paginate(Bucket=os.environ["R2_BUCKET"], Prefix=prefix):
              for item in page.get("Contents", []):
                  key = item["Key"]
                  match = pattern.match(key)
                  if not match:
                      unexpected.append(key)
                      continue
                  shard_index = int(match.group(1))
                  key_shard_count = int(match.group(2))
                  if key_shard_count != shard_count or not 0 <= shard_index < shard_count:
                      unexpected.append(key)
                      continue
                  found[shard_index] = key

          missing = sorted(set(range(shard_count)) - set(found))
          if missing or unexpected or len(found) != shard_count:
              lines = [
                  "## Finalize blocked",
                  f"- Run ID: `{run_id}`",
                  f"- Expected manifests: `{shard_count}`",
                  f"- Found manifests: `{len(found)}`",
              ]
              if missing:
                  lines.append(f"- Missing shard indexes: `{','.join(str(i) for i in missing)}`")
              if unexpected:
                  lines.append(f"- Unexpected manifest keys: `{', '.join(sorted(unexpected))}`")
              if summary_path := os.environ.get("GITHUB_STEP_SUMMARY"):
                  with open(summary_path, "a", encoding="utf-8") as fh:
                      fh.write("\n".join(lines) + "\n")
              raise SystemExit("missing or unexpected shard manifests; see job summary")

          manifest_keys = []
          for shard_index in range(shard_count):
              key = found[shard_index]
              target = manifest_dir / f"shard-{shard_index}-of-{shard_count}.json"
              client.download_file(os.environ["R2_BUCKET"], key, str(target))
              manifest_keys.append(key)

          index_path = Path("artifacts/manifest-index.json")
          index_path.write_text(
              json.dumps(
                  {"run_id": run_id, "shard_count": shard_count, "manifest_keys": manifest_keys},
                  indent=2,
              ),
              encoding="utf-8",
          )
          print(f"Downloaded {len(manifest_keys)} manifests to {manifest_dir}")
          PY

      - name: Merge shard manifests
        run: uv run kellblog-audio merge-shard-manifests --run-id "${{ needs.prepare.outputs.run_id }}" --manifest-dir artifacts/manifests

      - name: Publish feed only
        run: uv run kellblog-audio publish --skip-audio

      - name: Backup final run catalog
        run: uv run kellblog-audio backup-catalog --run-id "${{ needs.prepare.outputs.run_id }}" --kind final

      - name: Backup daily catalog snapshot
        run: uv run kellblog-audio backup-catalog

      - name: Upload run summary report
        env:
          RUN_ID: ${{ needs.prepare.outputs.run_id }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
          YEAR: ${{ needs.prepare.outputs.year }}
          QA_FIRST: ${{ needs.prepare.outputs.qa_first }}
          LOCAL_HELPER_SHARDS: ${{ needs.prepare.outputs.local_helper_shards }}
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          import boto3
          from botocore.config import Config

          manifest_dir = Path("artifacts/manifests")
          counts = {"done": 0, "error": 0, "skipped": 0}
          for path in sorted(manifest_dir.glob("*.json")):
              data = json.loads(path.read_text(encoding="utf-8"))
              manifest_counts = data.get("counts", {})
              counts["done"] += int(manifest_counts.get("done", 0))
              counts["error"] += int(manifest_counts.get("error", 0))
              counts["skipped"] += int(manifest_counts.get("skipped", 0))

          summary = {
              "run_id": os.environ["RUN_ID"],
              "shard_count": int(os.environ["SHARD_COUNT"]),
              "year": os.environ.get("YEAR") or None,
              "qa_first": int(os.environ["QA_FIRST"]),
              "local_helper_shards": [
                  int(token)
                  for token in os.environ.get("LOCAL_HELPER_SHARDS", "").split(",")
                  if token
              ],
              "counts": counts,
              "final_catalog_key": f"backfill/runs/{os.environ['RUN_ID']}/catalog/final.sqlite",
          }

          summary_path = Path("artifacts/summary.json")
          summary_path.write_text(json.dumps(summary, indent=2), encoding="utf-8")

          endpoint = f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com"
          client = boto3.client(
              "s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["R2_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["R2_SECRET_ACCESS_KEY"],
              config=Config(signature_version="s3v4"),
          )
          client.upload_file(
              str(summary_path),
              os.environ["R2_BUCKET"],
              f"backfill/runs/{os.environ['RUN_ID']}/reports/summary.json",
              ExtraArgs={"ContentType": "application/json"},
          )

          if summary_md := os.environ.get("GITHUB_STEP_SUMMARY"):
              with open(summary_md, "a", encoding="utf-8") as fh:
                  fh.write("## Distributed backfill complete\n")
                  fh.write(f"- Run ID: `{summary['run_id']}`\n")
                  fh.write(f"- Shards: `{summary['shard_count']}`\n")
                  fh.write(f"- Local helper shards: `{summary['local_helper_shards'] or 'none'}`\n")
                  fh.write(f"- Year filter: `{summary['year'] or 'all years'}`\n")
                  fh.write(f"- QA first: `{summary['qa_first']}`\n")
                  fh.write(f"- Done: `{counts['done']}`\n")
                  fh.write(f"- Errors: `{counts['error']}`\n")
                  fh.write(f"- Skipped: `{counts['skipped']}`\n")
          PY

      - name: Upload finalize artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backfill-finalize-${{ needs.prepare.outputs.run_id }}
          path: |
            artifacts/manifest-index.json
            artifacts/summary.json
            artifacts/manifests/
          if-no-files-found: error

  auto-restart:
    needs: [prepare, synthesize, finalize]
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install Python package
        run: uv sync --frozen --extra chatterbox

      - name: Decide whether to dispatch a continuation run
        id: decide
        env:
          RUN_ID: ${{ needs.prepare.outputs.run_id }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
          QA_FIRST: ${{ needs.prepare.outputs.qa_first }}
          YEAR: ${{ needs.prepare.outputs.year }}
          LOCAL_HELPER_SHARDS: ${{ needs.prepare.outputs.local_helper_shards }}
          AUTO_RESUME: ${{ needs.prepare.outputs.auto_resume }}
          RESUME_DEPTH: ${{ needs.prepare.outputs.resume_depth }}
          MAX_AUTO_RESUMES: ${{ needs.prepare.outputs.max_auto_resumes }}
        run: |
          uv run python - <<'PY'
          import json
          import os

          from kellblog_audio.distributed_backfill import (
              plan_backfill_auto_restart,
          )
          from kellblog_audio.publish import get_s3_client

          auto_resume = os.environ.get("AUTO_RESUME", "1").strip().lower() in {"1", "true", "yes", "on"}
          resume_depth = int(os.environ.get("RESUME_DEPTH", "0"))
          max_auto_resumes = int(os.environ.get("MAX_AUTO_RESUMES", "10"))
          summary_error_count = None
          summary_key = f"backfill/runs/{os.environ['RUN_ID']}/reports/summary.json"
          try:
              payload = (
                  get_s3_client()
                  .get_object(Bucket=os.environ["R2_BUCKET"], Key=summary_key)["Body"]
                  .read()
              )
              summary = json.loads(payload.decode("utf-8"))
              summary_error_count = int(summary.get("counts", {}).get("error", 0))
          except Exception:
              summary_error_count = None

          decision = plan_backfill_auto_restart(
              run_id=os.environ["RUN_ID"],
              shard_count=int(os.environ["SHARD_COUNT"]),
              qa_first=int(os.environ["QA_FIRST"]),
              year=os.environ.get("YEAR", ""),
              local_helper_shards_raw=os.environ.get("LOCAL_HELPER_SHARDS", ""),
              auto_resume=auto_resume,
              resume_depth=resume_depth,
              max_auto_resumes=max_auto_resumes,
              summary_error_count=summary_error_count,
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_dispatch={'true' if decision.should_dispatch else 'false'}\n")
              fh.write(f"mode={decision.mode}\n")
              fh.write(f"reason={decision.reason}\n")
              fh.write(f"gha_shards={','.join(str(shard) for shard in decision.gha_shards)}\n")
              fh.write(f"missing_shards={','.join(str(shard) for shard in decision.missing_shards)}\n")
              fh.write(f"resume_run_id={decision.resume_run_id or ''}\n")
              fh.write(f"seed_run_id={decision.seed_run_id or ''}\n")
              fh.write(f"next_resume_depth={decision.next_resume_depth}\n")
          PY

      - name: Dispatch continuation run
        if: ${{ steps.decide.outputs.should_dispatch == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
          QA_FIRST: ${{ needs.prepare.outputs.qa_first }}
          YEAR: ${{ needs.prepare.outputs.year }}
          LOCAL_HELPER_SHARDS: ${{ needs.prepare.outputs.local_helper_shards }}
          AUTO_RESUME: ${{ needs.prepare.outputs.auto_resume }}
          MAX_AUTO_RESUMES: ${{ needs.prepare.outputs.max_auto_resumes }}
          RESUME_RUN_ID: ${{ steps.decide.outputs.resume_run_id }}
          SEED_RUN_ID: ${{ steps.decide.outputs.seed_run_id }}
          NEXT_RESUME_DEPTH: ${{ steps.decide.outputs.next_resume_depth }}
        run: |
          cmd=(
            gh workflow run .github/workflows/backfill-distributed.yml
            --ref "${{ github.ref_name }}"
            -f shard_count="$SHARD_COUNT"
            -f qa_first="$QA_FIRST"
            -f auto_resume="$AUTO_RESUME"
            -f resume_depth="$NEXT_RESUME_DEPTH"
            -f max_auto_resumes="$MAX_AUTO_RESUMES"
          )
          if [[ -n "$RESUME_RUN_ID" ]]; then
            cmd+=( -f resume_run_id="$RESUME_RUN_ID" )
          fi
          if [[ -n "$SEED_RUN_ID" ]]; then
            cmd+=( -f seed_run_id="$SEED_RUN_ID" )
          fi
          if [[ -n "$YEAR" ]]; then
            cmd+=( -f year="$YEAR" )
          fi
          if [[ -n "$LOCAL_HELPER_SHARDS" ]]; then
            cmd+=( -f local_helper_shards="$LOCAL_HELPER_SHARDS" )
          fi
          "${cmd[@]}"

      - name: Write auto-restart summary
        run: |
          {
            echo "## Auto-restart check"
            echo "- Dispatch needed: \`${{ steps.decide.outputs.should_dispatch }}\`"
            echo "- Mode: \`${{ steps.decide.outputs.mode }}\`"
            echo "- Reason: \`${{ steps.decide.outputs.reason }}\`"
            echo "- Missing shard manifests: \`${{ steps.decide.outputs.missing_shards || 'none' }}\`"
            echo "- Missing GitHub-hosted shard manifests: \`${{ steps.decide.outputs.gha_shards || 'none' }}\`"
            echo "- Resume run: \`${{ steps.decide.outputs.resume_run_id || 'none' }}\`"
            echo "- Seed run: \`${{ steps.decide.outputs.seed_run_id || 'none' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
